<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clear Cosmetics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup-card">
    <div class="popup-content">
      <div class="intro">
        <h1 class="title">Welcome to ClearCosmetics</h1>
        <p class="description">
          Your trusted review aggregator for makeup products. Get honest, comprehensive summaries from verified reviews across the web.
        </p>
      </div>

      <!-- TEMP: YouTube test mode — remove when Gemini + scraper are ready -->
      <div class="input-group">
        <label for="productInput" class="label">Product name or page URL</label>
        <input
          id="productInput"
          type="text"
          placeholder="e.g., Rare Beauty Soft Pinch Lip Oil"
          class="search-input"
        />
      </div>

      <button id="summarizeBtn" class="summarize-btn">
        Search YouTube Reviews
      </button>

      <div id="resultsBox" class="results-box hidden"></div>
      <!-- END TEMP -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
