<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clear Cosmetics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup-card">
    <div class="popup-content">

      <div class="intro">
        <h1 class="title">Welcome to ClearCosmetics</h1>
        <p class="description">
          Your trusted review aggregator for makeup products. Get honest,
          comprehensive summaries from verified reviews across the web.
        </p>
      </div>

      <div class="input-group">
        <label for="search" class="label">Search specifications (optional)</label>
        <input
          id="search"
          type="text"
          placeholder="e.g., dry skin, vegan, cruelty-free..."
          class="search-input"
        />
      </div>

      <button id="summarizeBtn" class="summarize-btn">
        Summarize Reviews
      </button>

      <!-- Sephora reviews + YouTube results both render inside here -->
      <div id="summaryBox" class="summary-box hidden"></div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
